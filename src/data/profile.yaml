      en: "Information security, data privacy, privacy-preserving machine learning, and secure cloud computing."
      zh: "信息安全、数据隐私、隐私保护机器学习与安全云计算。"
  - key: multimedia
    name: { en: "Multimedia Security & Forensics", zh: 多媒体安全与取证 }
    desc:
